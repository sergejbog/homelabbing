services:
  norish:
    image: norishapp/norish:latest
    container_name: norish-app
    restart: always
    user: "1000:1000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.norish.entrypoints=https"
      - "traefik.http.routers.norish.rule=Host(`norish.${DOMAIN_NAME}`)"
      - "traefik.http.routers.norish.middlewares=AddForwardedHeader@file"
      - "traefik.http.routers.norish.tls=true"
      - "traefik.http.routers.norish.tls.certresolver=myresolver"
      - "traefik.http.routers.norish.service=norish"
      - "traefik.http.services.norish.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
    volumes:
      - norish_data:/app/uploads
    env_file: .env
    healthcheck:
      test: [ "CMD-SHELL", 'node -e "require(''http'').get(''http://localhost:3000/api/health'', r => process.exit(r.statusCode===200?0:1))"' ]
      interval: 1m
      timeout: 15s
      retries: 3
      start_period: 1m
    networks:
      proxy:
    depends_on:
      - db
      - norish-redis

  db:
    image: postgres:17-alpine
    container_name: norish-db
    restart: unless-stopped
    env_file: .env
    networks:
      proxy:
    volumes:
      - db_data:/var/lib/postgresql/data

  chrome-headless:
    image: zenika/alpine-chrome:latest
    container_name: chrome-headless
    restart: unless-stopped
    networks:
      proxy:
    command:
      - "--no-sandbox"
      - "--disable-gpu"
      - "--disable-dev-shm-usage"
      - "--remote-debugging-address=0.0.0.0"
      - "--remote-debugging-port=3000"
      - "--headless"

  norish-redis:
    image: redis:8.4.0
    container_name: norish-redis
    restart: unless-stopped
    networks:
      proxy:
    volumes:
      - redis_data:/data

volumes:
  db_data:
  norish_data:
  redis_data:


networks:
  proxy:
    external: true
